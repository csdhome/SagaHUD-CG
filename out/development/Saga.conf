        function Kinematic.computeBrakingDistance(initialSpeed, distance, brakes, axis)
        	local cD = cData
        	local mass, G, airFriction = cD.mass, cD.G, axis:dot(cD.worldAirFriction)

        		local direction, absDist = sign(distance), abs(distance)

