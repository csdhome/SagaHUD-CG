        		local c1  = math.pi/t50/2

        		local v = function(t)
        			return a0*(t/2 - t50*math.sin(c1*t)/math.pi) + b0*t + initial
        		end

        		local speedchk = speedUp and function(s) return s >= final end or
        									 function(s) return s <= final end
        		timeToMax = 2*t50

