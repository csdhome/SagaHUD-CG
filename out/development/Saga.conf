        function getAggData()
        	local agg = links.antigrav
        	if agg == nil then
        		return { aggState = false, aggStrength = 0, aggRate = 0, aggPower = 0,
        			aggPulsor = 6, aggTarget = 1000, aggAltitude = 1000, aggBubble = false }
        	end
