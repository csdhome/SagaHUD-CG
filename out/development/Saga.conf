        package.preload['Saga:data/links.lua']=(function()

        links = {
            core = nil,
            warpdrive = nil,
            shield = nil,
            antigrav = nil,
            gyro = nil,
            transponder = nil,
            databanks = {},
            weapons = {},
            switches = {},
            electronics = nil,
            radars = {},
            telemeter = nil,
            hovers = {},
            hoverCount = 0,
        	screen = nil,
            vboosters = {},
            vBoosterCount = 0
        }


        function scanLinks()
        	for slotName, slot in pairs(unit) do
        		if type(slot) == "table"
        			and type(slot.export) == "table"
        			and slot.getClass
        		then
        			local elementClass = slot.getClass():lower()
        			slot.slotName = slotName
        			slot.elementClass = elementClass
        			if elementClass:find("coreunit") then
        				links.core = slot
        			elseif elementClass:find("screen") then
        				links.screen = slot
        			elseif elementClass:find("radar") then
        				table.insert(links.radars, slot)
        			elseif elementClass:find("warpdriveunit") then
        				links.warpdrive = slot
        			elseif elementClass:find("databankunit") then
        				table.insert(links.databanks, slot)
        			elseif elementClass:find("shieldgenerator") then
        				links.shield = slot
        			elseif elementClass:find("weapon") then
        				table.insert(links.weapons, slot)
        			elseif elementClass:find("gyrounit") then
        				links.gyro = slot
        			elseif elementClass:find("antigravitygeneratorunit") then
        				links.antigrav = slot
        			elseif elementClass:find("combatdefense") then
        				links.transponder = slot
        			elseif elementClass:find('manualswitchunit') then
        				table.insert(links.switches, slot)
        			elseif elementClass:find("telemeter") then
        				links.telemeter = slot
        			elseif elementClass:find("hover") then
        				table.insert(links.hovers, slot)
                        links.hoverCount = links.hoverCount + 1
        			elseif elementClass:find("verticalbooster") then
        				table.insert(links.vboosters, slot)
                        links.vBoosterCount = links.vBoosterCount + 1
        			end
        		end
        	end
        end


        function finaliseLinks()
        	links.electronics = Electronics

        		for _,databank in ipairs(links.databanks) do
        		databank.id = databank.getLocalId()
        		databank.name = links.core.getElementNameById(databank.id)
        	end
        		table.sort(links.databanks, function(a,b) return a.id < b.id end)

        		for _,switch in ipairs(links.switches) do
        		local switchName = links.core.getElementNameById(switch.getLocalId())
        		if switchName:lower():find('door') then
        			table.insert(links.electronics.doors, switch)
        		elseif switchName:lower():find('forcefield') then
        			table.insert(links.electronics.forcefields, switch)
        		else
        			table.insert(links.electronics.switches, switch)
        		end
        	end

        		for _,radar in ipairs(links.radars) do
        		radar.pvp = (radar.slotName == 'slot21' or radar.slotName == 'slot14')
        	end
        end

        end)

        package.preload['Saga:events/keyboard.lua']=(function()

        mmbClick = 0 forwardClick = 0 

        inputs = {
        	pitch = 0,
        	roll = 0,
        	yaw = 0,
        	brake = 0,
        	manualBrake = false,
        	brakeLock = false,
        	up = false,
        	down = false,
        	left = false,
        	right = false,
        	alt = false,
        	shift = false,
        	mouseLeft = false,
        	direction = vec3(0,0,0),
        	rotation = vec3(0,0,0),
        	mu = false,
        	md = false,
        	ml = false,
        	mr = false
        }

        local axisLong = axisCommandId.longitudinal

        local axisLat = axisCommandId.lateral

        local axisVert = axisCommandId.vertical


        function onShift(on)
        	inputs.shift = on
        	end

        function onAlt(on)
        	inputs.alt = on
        	end

        function onMouseDown()
        	inputs.mouseLeft = true
        end


        function onMouseUp()
        	inputs.mouseLeft = false
        end


        function onAlt1()
        	if inputs.shift then return HUD.toggleMainMenu() end
        	local ap, s, cD = AutoPilot, ship, cData
        	if not globals.maneuverMode then
        		return ap:toggleState(not ap.enabled)
        	end
        		if not ap.target then return end
        	if s.gotoLock then
        		s.resetMoving()
        		resetAP()
        		ap.target = nil
        	elseif cD.isLanded then
        		P'[E] Liftoff first!'
        	else
        		inputs.brakeLock = false
        		s.switchState('ALTITUDE')
        		s.gotoLock = ap.target
        		s.targetVector = (s.gotoLock - cD.position):normalize()
        		s.travel = true
        		P("Moving to: " .. tostring(Vec3ToPosString(ap.target)))
        	end
        end


        function onAlt2()
        	local gC, _inputs = globals, inputs
        	if cData.warpOn or ship.landingMode then
        		gC.altitudeHold = false
        		gC.followMode = false
        		return
        	end
        	gC.manualOrbitAlt = 0
        	if not (gC.altitudeHold or gC.followMode) then
        		if gC.maneuverMode or not _inputs.shift then
        			gC.holdAltitude = cData.altitude
        			gC.altitudeHold = true
        		else
        			if player.isSeated() == false then
        				gC.followMode = true
        			else
        				P('[E] Not on Remote, follow disabled!')
        			end
        		end
        		return
        	end
        	if not gC.altitudeHold and gC.followMode then
        		gC.followMode = false
        	elseif gC.altitudeHold and not gC.followMode then
        		gC.altitudeHold = false
        	end
        end


        function onAlt3()
        	local gC = globals
        	if cData.warpOn or gC.maneuverMode then return end
        	gC.manualOrbitAlt = 0
        	if not gC.orbitalHold then
        		if gC.spaceCapable then
        			resetModes()
        			gC.orbitalHold = true
        			setTargetOrbitAlt()
        		else
        			P('Space thrust not detected: Orbital Hold Disabled')
        			gC.orbitalHold = false
        		end
        	else
        		gC.orbitalHold = false
        	end
        end


        function onAlt4()
        	local gC = globals
        	if not gC.radialOut and not gC.radialIn and not gC.cameraAim then
        		gC.radialMode = 'radial out'
        		gC.radialOut = not gC.radialOut
        	elseif gC.radialOut then
        		gC.radialMode = 'radial in'
        		gC.radialOut = not gC.radialOut
        		gC.radialIn = not gC.radialIn
        	elseif gC.radialIn then
        		gC.radialMode = 'camera aim'
        		gC.cameraAim = true
        		gC.radialIn = not gC.radialIn
        	else
        		gC.radialMode = 'off'
        		gC.cameraAim = false
        	end
        end


        function onAlt5()
        	local gC = globals
        	if gC.boostMode == 'all' then
        		gC.boostMode = 'primary'
        	elseif gC.boostMode == 'primary' then
        		gC.boostMode = 'hybrid'
        	elseif gC.boostMode == 'hybrid' then
        		gC.boostMode = 'locked'
        	else gC.boostMode = 'all'
        	end
        end


        local function newRtIdx(current, maxIdx, down)
        	if down then return math.max(1, current - 1) end
        	return math.min(maxIdx, current + 1)
        end


        function onAlt6()
        	local ap, rdb = AutoPilot, RouteDatabase
        	if ap.enabled or #rdb.routes < 1 then return end
        	if not inputs.shift and inputs.alt then
        		ap.currentRouteIndex = newRtIdx(ap.currentRouteIndex or 1, #rdb.routes, true)
        		ap:setActiveRoute(ap.currentRouteIndex)
        	elseif inputs.shift and inputs.alt then
        		setApTarget(Config:getValue(configDatabankMap.base))
        	end
        end


        function onAlt7()
        	local ap, rdb = AutoPilot, RouteDatabase
        	if ap.enabled or #rdb.routes < 1 then return end
        	if not inputs.shift and inputs.alt then
        		ap.currentRouteIndex = newRtIdx(ap.currentRouteIndex or 1, #rdb.routes, false)
        		ap:setActiveRoute(ap.currentRouteIndex)
        	elseif inputs.shift and inputs.alt then
        		Config:setValue(configDatabankMap.base, cData.position)
        		local aPos = Vec3ToPosString(cData.position)
        		P("Base set to: " .. tostring(aPos))
        	end
        end



        function onAlt8()
        	local gC, ap = globals, AutoPilot
        	if inputs.shift then
        		ap.userConfig.slowFlat = not ap.userConfig.slowFlat
        	elseif inputs.alt then
        		gC.rotationDampening = not gC.rotationDampening 	end
        end


        function onAlt9()
        	local gC, ap = globals, AutoPilot
        	if cData.warpOn or ap.enabled then
        		return P"[E] Can't toggle now"
        	end
        	if gC.maneuverMode then ship.resetMoving() end
        	gC.maneuverMode = not gC.maneuverMode
        	Config:setValue(configDatabankMap.maneuverMode, gC.maneuverMode)
        	if gC.maneuverMode then return end
        	setThrottle()
        	navCom:resetCommand(axisCommandId.vertical)
        	navCom:deactivateGroundEngineAltitudeStabilization()
        end


        function onWarpDown() 	if links.warpdrive ~= nil then links.warpdrive.activateWarp() end

        end


        function onAntigravDown() 	if links.antigrav ~= nil then links.antigrav.toggle() end

        end


        function onBoosterDown() 	Nav:toggleBoosters()

        end


        function onLightDown() 	if unit.isAnyHeadlightSwitchedOn() then
        		unit.switchOffHeadlights()
        	else
        		unit.switchOnHeadlights()
        	end
        end


        local DOUBLE_CLICK_MIN_THRESHOLD = 0.1 local DOUBLE_CLICK_MAX_THRESHOLD = 0.4 

        function onMmbDown() 	if globals.maneuverMode then
        		local currentTime = system.getUtcTime()
        		mmbClick = mmbClick or 0
        		local time_since_last_click = currentTime - mmbClick
        		if mmbClick == 0 or
        			time_since_last_click < DOUBLE_CLICK_MIN_THRESHOLD or
        			currentTime - mmbClick >= DOUBLE_CLICK_MAX_THRESHOLD then
        						mmbClick = currentTime
        		else
        			mmbClick = 0 			ship.toggleMmb()
        		end
        	else
        		navCom:resetCommand(axisLong)
        	end
        end


        function onMmbUp() end


        function onLandingGearDown() 	local gC, ap = globals, AutoPilot

        		if ap.enabled then ap:toggleState(false) end
        	if ship.mmbThrottle then ship.toggleMmb() end
        	gC.altitudeHold = false
        	if gC.prevStdMode then
        		gC.maneuverMode = false
        	end
        	gC.prevStdMode = false

        	inputs.brake = 0
        	inputs.brakeLock = false
        		if cData.isLanded then
        		ship.landingMode = false
        				if not gC.maneuverMode then
        			return ap:toggleLandingMode(false)
        		end
        		moveVert(ap.userConfig.hoverHeight)
        		ship.takeoff = true
        		ship.travel = false
        		ship.vertical = false
        		return
        	end

        		if (ap.landingMode or ship.landingMode) then
        		ap.landingMode = false
        		ship.landingMode = false
        		if gC.maneuverMode then
        						ship.resetMoving()
        			if gC.prevStdMode then
        				gC.maneuverMode = false
        			end
        		end
        		if not gC.maneuverMode then
        			setThrottle()
        			navCom:activateGroundEngineAltitudeStabilization()
        			if not gC.startup then
        				ap:toggleLandingMode(false)
        			end
        		end
        		return
        	end

        		if not gC.maneuverMode then
        		ship.resetManeuver()
        		gC.prevStdMode = true
        	end
        	ship.landingMode = true
        	ap.landingMode = false
        		ship.prepLanding()
        	setThrottle(1,1,1)
        end


        function onUpArrowDown() 	inputs.md = false
        	local gC = globals
        	if HUD.Config.mainMenuVisible then
        		inputs.mu = true
        	else
        		inputs.up = true
        		if gC.maneuverMode then
        			isStartup = false
        			inputs.brakeLock = false
        			inputs.brake = 0
        		else
        			navCom:resetCommand(axisVert)
        			navCom:deactivateGroundEngineAltitudeStabilization()
        			navCom:updateCommandFromActionStart(axisVert, 1.0)
        		end
        	end
        	gC.verticalState = true
        end


        function onUpArrowUp() 	inputs.mu = false
        	inputs.up = false
        	local gC = globals
        	if not HUD.Config.mainMenuVisible then
        		if gC.maneuverMode then
        			if gC.altitudeHold then gC.holdAltitude = cData.altitude end
        		else
        			navCom:resetCommand(axisVert)
        			navCom:activateGroundEngineAltitudeStabilization()
        		end
        	end
        	gC.verticalState = false
        end


        function onDownArrowDown() 	inputs.mu = false
        	local gC = globals
        	if HUD.Config.mainMenuVisible then
        		inputs.md = true
        	else
        		inputs.down = true
        		if not (cData.isLanded or gC.maneuverMode) then
        			navCom:resetCommand(axisVert)
        			navCom:deactivateGroundEngineAltitudeStabilization()
        			navCom:updateCommandFromActionStart(axisVert, -1.0)
        		end
        	end
        	gC.verticalState = true
        end


        function onDownArrowUp() 	inputs.md = false
        	inputs.down = false
        	local gC = globals
        	if not HUD.Config.mainMenuVisible then
        		if gC.maneuverMode then
        			if gC.altitudeHold then gC.holdAltitude = cData.altitude end
        		else
        						navCom:resetCommand(axisVert)
        			navCom:activateGroundEngineAltitudeStabilization()
        		end
        	end
        	gC.verticalState = false
        end


        local function isForStdMode()
        	return not (globals.maneuverMode or HUD.Config.mainMenuVisible)
        end


        local function axLat(isStart,value)
        	if globals.maneuverMode then return end
        	if isStart then
        		navCom:updateCommandFromActionStart(axisLat, value)
        	else
        		navCom:updateCommandFromActionStop(axisLat, value)
        	end
        end


        local function resetLeftRight()
        	inputs.direction.x = 0
        	inputs.left = false
        	inputs.right = false
        	inputs.ml = false
        	inputs.mr = false
        end


        function onLeftArrowDown() 	resetLeftRight()
        	if HUD.Config.mainMenuVisible then inputs.ml = true return end
        	inputs.direction.x = -1
        	inputs.left = true
        	if isForStdMode() then axLat(true,-1) end
        	globals.lateralState = true
        end


        function onLeftArrowUp() 	resetLeftRight()
        	if isForStdMode() then axLat(false,1) end
        	globals.lateralState = false
        end


        function onRightArrowDown() 	resetLeftRight()
        	if HUD.Config.mainMenuVisible then inputs.mr = true return end
        	inputs.direction.x = 1
        	inputs.right = true
        	if isForStdMode() then axLat(true,1) end
        	globals.lateralState = true
        end


        function onRightArrowUp() 	resetLeftRight()
        	if isForStdMode() then axLat(false,-1) end
        	globals.lateralState = false
        end


        function onForwardDown() 	inputs.pitch = inputs.pitch - 1
        	if not globals.maneuverMode or not inputs.alt then return end
        	local currentTime = system.getUtcTime()
        	forwardClick = forwardClick or 0
        	local time_since_last_click = currentTime - forwardClick
        	if forwardClick == 0 or
        		time_since_last_click < DOUBLE_CLICK_MIN_THRESHOLD or
        		currentTime - forwardClick >= DOUBLE_CLICK_MAX_THRESHOLD then
        		forwardClick = currentTime
        	else
        		forwardClick = 0
        		ship.toggleMmb()
        	end
        end


        function onForwardUp() 	inputs.pitch = 0

        end


        function onBackwardDown() 	inputs.pitch = inputs.pitch + 1

        end


        function onBackwardUp() 	inputs.pitch = 0

        end


        function onLeftDown() 	inputs.roll = inputs.roll - 1

        end


        function onLeftUp() 	inputs.roll = 0

        end


        function onRightDown() 	inputs.roll = inputs.roll + 1

        end


        function onRightUp() 	inputs.roll = 0

        end


        function onYawLeftDown()
        	if inputs.yaw < 0 then
        		ship.rotationSpeed = ship.rotationSpeedMin
        	end
        	inputs.yaw = 1
        end


        function onYawLeftUp()
        	if inputs.yaw > 0 then
        		inputs.yaw = 0
        	else
        		ship.rotationSpeed = ship.rotationSpeedMin
        	end
        end


        function onYawRightDown()
        	if inputs.yaw > 0 then
        		ship.rotationSpeed = ship.rotationSpeedMin
        	end
        	inputs.yaw = -1
        end


        function onYawRightUp()
        	if inputs.yaw < 0 then
        		inputs.yaw = 0
        	else
        		ship.rotationSpeed = ship.rotationSpeedMin
        	end
        end


        function onGroundAltitudeDownDown(loop) 	local gC, s = globals, ship
        	if gC.maneuverMode and gC.altitudeHold then
        		if s.holdAltitude > 109 then
        			s.holdAltitude = RoundAlt(s.holdAltitude, ternary(loop, -5, -10))
        		end
        	else
        		AutoPilot:addHoverHeight(-0.25, loop)
        	end
        end


        function onGroundAltitudeUpDown(loop) 	local gC, s = globals, ship
        	if gC.maneuverMode and gC.altitudeHold then
        		s.holdAltitude = RoundAlt(s.holdAltitude, ternary(loop, 5, 10))
        	else
        		AutoPilot:addHoverHeight(0.25, loop)
        	end
        end


        function onSpeedUpDown() 	navCom:updateCommandFromActionStart(axisLong, 5.0)
        	globals.safetyThrottle = false
        end


        function onSpeedUpLoop() 	navCom:updateCommandFromActionLoop(axisLong, 1.0)
        	globals.safetyThrottle = false
        end


        function onSpeedDownDown() 	navCom:updateCommandFromActionStart(axisLong, -5.0)
        	globals.safetyThrottle = false
        end


        function onSpeedDownLoop() 	navCom:updateCommandFromActionLoop(axisLong, -1.0)
        	globals.safetyThrottle = false
        end


        function onBrakeDown() 	inputs.brake = 1
        	inputs.manualBrake = true
        	AutoPilot.enabled = false
        	resetAP()
        	inputs.brakeLock = inputs.alt
        end


        function onBrakeLoop() 	if globals.maneuverMode then inputs.brake = 1 return end
        	if navCom:getAxisCommandType(axisLong) == axisCommandType.byTargetSpeed then
        		local speed = navCom:getTargetSpeed(axisLong)
        		if (math.abs(speed) > 0.01) then
        			navCom:updateCommandFromActionLoop(axisLong, - utils.sign(speed))
        		end
        	end
        end


        function onBrakeUp() 	if not inputs.alt then
        		inputs.brake = 0
        		inputs.manualBrake = false
        	end
        end


        function onActionStart(id)
        	if id == "lalt" then onAlt(true) end
        	if id == "lshift" then onShift(true) end
        	if id == "brake" then onBrakeDown() end
        	if id == "option1" then
        		onAlt1()
        	elseif id == "option2" then
        		onAlt2()
        	elseif id == "option3" then
        		onAlt3()
        	elseif id == "option4" then
        		onAlt4()
        	elseif id == "option5" then
        		onAlt5()
        	elseif id == "option6" then
        		onAlt6()
        	elseif id == "option7" then
        		onAlt7()
        	elseif id == "option8" then
        		onAlt8()
        	elseif id == "option9" then
        		onAlt9()
        	elseif id == "forward" then
        		onForwardDown()
        	elseif id == "backward" then
        		onBackwardDown()
        	elseif id == "left" then
        		if globals.maneuverMode then
        			onLeftArrowDown()
        		else
        			onLeftDown()
        		end
        	elseif id == "right" then
        		if globals.maneuverMode then
        			onRightArrowDown()
        		else
        			onRightDown()
        		end
        	elseif id == "yawleft" then
        		onYawLeftDown()
        	elseif id == "yawright" then
        		onYawRightDown()
        	elseif id == "strafeleft" then
        		onLeftArrowDown()
        	elseif id == "straferight" then
        		onRightArrowDown()
        	elseif id == "up" then
        		onUpArrowDown()
        	elseif id == "down" then
        		onDownArrowDown()
        	elseif id == "groundaltitudeup" then
        		onGroundAltitudeUpDown()
        	elseif id == "groundaltitudedown" then
        		onGroundAltitudeDownDown()
        	elseif id == "gear" then
        		onLandingGearDown()
        	elseif id == "light" then
        		onLightDown()
        	elseif id == "leftmouse" then
        		onMouseDown()
